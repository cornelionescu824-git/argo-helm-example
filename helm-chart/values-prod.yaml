# Production environment overrides
# Use with: helm upgrade simple-api ./helm-chart -f values.yaml -f values-prod.yaml -n simple-api-prod

replicaCount: 2

zookeeper:
  enabled: true
  node: "/prod/config"
  defaultValue: "prod-default-value"

app:
  message: "Hello from Production"
  environment: "prod"

monitor:
  enabled: true
  url: "https://prod.example.com/health"
  interval: 10

ingress:
  enabled: true
  host: "prod.simple-api.local"
  className: "nginx"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
