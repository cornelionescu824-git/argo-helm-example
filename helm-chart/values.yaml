replicaCount: 1

# Zookeeper - separate pod
zookeeper:
  enabled: true
  image:
    repository: zookeeper
    tag: "3.9"
    pullPolicy: IfNotPresent
  node: "/app/config"
  defaultValue: "default-from-zk"

image:
  repository: simple-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Sidecar: monitors a configurable URL (curl in a loop)
monitor:
  enabled: true
  image:
    repository: url-monitor
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  url: "https://www.google.com"
  interval: 10

service:
  type: ClusterIP
  port: 8080

app:
  message: "Hello from Simple API (Helm)"
  environment: "local"

# Ingress - host-based routing per environment
ingress:
  enabled: false
  host: "simple-api.local"
  className: "nginx"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
