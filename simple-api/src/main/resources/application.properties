server.port=8080
# Overridden by ConfigMap in Kubernetes
app.message=${APP_MESSAGE:Hello from Simple API}
app.environment=${APP_ENVIRONMENT:local}
# Zookeeper - overridden by env in Kubernetes
zookeeper.connect=${ZOOKEEPER_CONNECT:}
zookeeper.node=${ZOOKEEPER_NODE:/app/config}
zookeeper.default-value=${ZOOKEEPER_DEFAULT_VALUE:default-from-zk}
